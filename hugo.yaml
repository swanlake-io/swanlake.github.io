baseURL: https://swanlake.io/
title: SwanLake

contentDir: content/en

enableRobotsTXT: true
enableGitInfo: true

pygmentsCodeFences: true
pygmentsUseClasses: false
pygmentsUseClassic: false
pygmentsStyle: tango

permalinks:
  blog: /:section/:year/:month/:day/:slugorcontentbasename

imaging:
  resampleFilter: CatmullRom
  quality: 75
  anchor: smart

markup:
  goldmark:
    parser:
      attribute:
        block: true
    renderer:
      unsafe: true
  highlight:
    style: tango
    noClasses: false

outputs:
  home: [HTML, RSS]
  section: [HTML, RSS]

menu:
  main:
    - name: GitHub
      url: https://github.com/swanlake-io/swanlake
      weight: 45

params:
  description: Arrow Flight SQL server backed by DuckDB and DuckLake.
  version_menu: Releases
  archived_version: false
  version: 0.1
  versionWithBuildId: 0.1

  github_repo: https://github.com/swanlake-io/swanlake.github.io
  github_project_repo: https://github.com/swanlake-io/swanlake
  github_branch: main

  offlineSearch: true
  prism_syntax_highlighting: false

  copyright:
    authors: >-
      swanlake.io | [MIT License](https://github.com/swanlake-io/swanlake/blob/main/LICENSE)
    from_year: 2026
    to_year: present

  ui:
    breadcrumb_disable: false
    navbar_logo: true
    navbar_translucent_over_cover_disable: false
    sidebar_menu_foldable: true
    sidebar_menu_compact: false
    sidebar_search_disable: false
    showLightDarkModeMenu: true
    feedback:
      enable: true
      yes: >-
        Thanks. Please <a href="https://github.com/swanlake-io/swanlake/issues/new">open an
        issue</a> with details.
      no: >-
        Please <a href="https://github.com/swanlake-io/swanlake/issues/new">open an issue</a> so we
        can improve this page.
    readingtime:
      enable: true

  btn-lg: class="btn btn-lg btn-{1}" role="button"
  FA: <i class="fa-{1} fa-{2} text-{3} px-1"></i>

  links:
    user:
      - name: GitHub Discussions
        url: https://github.com/swanlake-io/swanlake/discussions
        icon: fa fa-comments
        desc: Ask questions and share usage patterns.
      - name: Issue Tracker
        url: https://github.com/swanlake-io/swanlake/issues
        icon: fa fa-bug
        desc: Report bugs and request features.
    developer:
      - name: SwanLake Repository
        url: https://github.com/swanlake-io/swanlake
        icon: fab fa-github
        desc: Server and client source code.
      - name: Packages
        url: https://github.com/swanlake-io/swanlake/pkgs/container/swanlake
        icon: fa fa-box
        desc: SwanLake container images.

security:
  funcs:
    getenv:
      - ^(BRANCH|BUILD_ID|COMMIT_REF|CONTEXT|DEPLOY_ID|NETLIFY|PULL_REQUEST|REVIEW_ID)$

module:
  hugoVersion:
    extended: true
    min: 0.155.0
  imports:
    - path: github.com/google/docsy
      disable: false
